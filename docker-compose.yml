version: '3.8'
services:
  backend:
    build: ./backend
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app/backend
    environment:
      - IMAP_HOST=imap.gmail.com
      - IMAP_PORT=993
      - IMAP_POLL_SECONDS=8
  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - '3000:3000'
